name: DNS

on:
  push:
    branches:
      - main
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: registryctl/go.mod

      - name: Check Go formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        working-directory: registryctl
        run: go test ./...

      - name: Validate registry
        working-directory: registryctl
        run: go run . validate --root ..

  pr-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout PR files
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: head
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: base/registryctl/go.mod

      - name: Test
        id: test
        continue-on-error: true
        working-directory: base/registryctl
        run: |
          set +e
          go test ./... > "$RUNNER_TEMP/registryctl-test.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/registryctl-test.log"
          exit "$status"

      - name: Check PR abuse prevention agreement
        id: body
        if: steps.test.outcome == 'success'
        continue-on-error: true
        working-directory: base/registryctl
        env:
          GITHUB_PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set +e
          go run . body-check > "$RUNNER_TEMP/body-check.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/body-check.log"
          exit "$status"

      - name: Check registry format and review requirement
        id: review
        if: steps.test.outcome == 'success'
        continue-on-error: true
        working-directory: base/registryctl
        env:
          GITHUB_PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set +e
          go run . review-check --base-root .. --head-root ../../head > "$RUNNER_TEMP/review-check.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/review-check.log"
          exit "$status"

      - name: Comment PR status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          BODY_OUTCOME: ${{ steps.body.outcome }}
          REVIEW_OUTCOME: ${{ steps.review.outcome }}
          REQUIRES_REVIEW: ${{ steps.review.outputs.requires_review }}
          AUTO_MERGE: ${{ steps.review.outputs.auto_merge }}
        run: |
          comment="$RUNNER_TEMP/pr-comment.md"
          if [ "$TEST_OUTCOME" != "success" ]; then
            {
              echo "Registry tooling test failed. Maintainers need to fix the registry checker before this PR can be validated."
              echo
              echo '```txt'
              cat "$RUNNER_TEMP/registryctl-test.log"
              echo '```'
            } > "$comment"
          elif [ "$BODY_OUTCOME" != "success" ]; then
            {
              echo "PR rejected: please complete all abuse prevention agreement checkboxes in the PR template."
              echo
              echo '```txt'
              cat "$RUNNER_TEMP/body-check.log"
              echo '```'
            } > "$comment"
          elif [ "$REVIEW_OUTCOME" != "success" ]; then
            {
              echo "Registry format check failed. Parser and validation errors are shown below."
              echo
              echo '```txt'
              cat "$RUNNER_TEMP/review-check.log"
              echo '```'
            } > "$comment"
          elif [ "$REQUIRES_REVIEW" = "true" ]; then
            echo "Registry format check passed. This PR requires maintainer review because it is an initial registration or includes non-auto-mergeable changes." > "$comment"
          elif [ "$AUTO_MERGE" = "true" ]; then
            echo "Registry format check passed. This PR is eligible for auto-merge." > "$comment"
          else
            echo "Registry format check passed." > "$comment"
          fi
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body-file "$comment"

      - name: Update PR validation label
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          BODY_OUTCOME: ${{ steps.body.outcome }}
          REVIEW_OUTCOME: ${{ steps.review.outcome }}
        run: |
          label="registry-check-passed"
          if [ "$TEST_OUTCOME" = "success" ] && [ "$BODY_OUTCOME" = "success" ] && [ "$REVIEW_OUTCOME" = "success" ]; then
            gh label create "$label" --repo ${{ github.repository }} --color "0E8A16" --description "Registry validation passed" || true
            gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label "$label"
          else
            gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --remove-label "$label" || true
          fi

      - name: Enable auto-merge
        if: steps.test.outcome == 'success' && steps.body.outcome == 'success' && steps.review.outcome == 'success' && steps.review.outputs.auto_merge == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --auto --squash

      - name: Fail on registryctl test errors
        if: steps.test.outcome != 'success'
        run: exit 1

      - name: Fail on incomplete abuse prevention agreement
        if: steps.body.outcome != 'success'
        run: exit 1

      - name: Fail on registry errors
        if: steps.review.outcome != 'success'
        run: exit 1

  sync:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: BAKA.LIFE
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: registryctl/go.mod

      - name: Check Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: test -n "$CLOUDFLARE_API_TOKEN" && test -n "$CLOUDFLARE_ZONE_ID"

      - name: Sync Cloudflare DNS
        working-directory: registryctl
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: go run . sync --root ..
